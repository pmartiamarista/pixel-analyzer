name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build WASM
        run: make wasm

      - name: Debug Config
        run: npm config list

      - name: Debug Package Info
        run: cat pkg/package.json

      - name: Publish to NPM
        run: |
          rm -f .npmrc ~/.npmrc
          npm publish --provenance --access public --verbose
        working-directory: pkg
